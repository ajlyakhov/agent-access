# When [project].version changes on main, create and push annotated tag v{version}.
#
# Requirements:
# - Bump version in both pyproject.toml and agent_access/__init__.py (__version__) in the same commit.
# - Publish workflow (.github/workflows/publish-pypi.yml) still runs when you *publish* a GitHub Release;
#   after this job pushes a tag, create a Release from that tag to upload to PyPI (or adjust publish to trigger on tags).
#
# The script lives in .github/scripts/tag_if_version_bumped.py

name: Tag on version bump

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "agent_access/__init__.py"

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create tag if version changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/tag_if_version_bumped.py
