# Publish source distributions to PyPI when a GitHub Release is published.
#
# Setup (one-time):
# 1. Create the PyPI project for this package (if it does not exist yet).
# 2. In PyPI: Your project → Settings → Publishing → Add a pending publisher
#    - Owner: ajlyakhov
#    - Repository name: agent-access
#    - Workflow name: publish-pypi.yml
#    - Environment name: leave blank (must match this workflow)
# 3. Bump the version in pyproject.toml / agent_access/__init__.py before releasing.
# 4. Create a GitHub Release (tag + publish); this workflow uploads the build artifacts.
#
# Docs: https://docs.pypi.org/trusted-publishers/

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
